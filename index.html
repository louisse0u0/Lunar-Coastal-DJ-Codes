<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Coastal DJ HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    border-bottom:1px solid rgba(255,215,0,.2);
}

header h1{
    color:gold;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
}

nav button{
    background:#1a1a1a;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

nav button.active{
    background:gold;
    color:black;
}

/* SECTIONS */
section{
    display:none;
    padding:20px;
}

section.active{
    display:block;
}

/* CARDS */
.card{
    background:#141414;
    padding:15px;
    margin:10px auto;
    border-radius:10px;
    max-width:500px;
    border:1px solid rgba(255,215,0,.2);
}

input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:6px;
    background:#222;
    color:white;
}

button{
    padding:10px;
    border:none;
    border-radius:6px;
    background:gold;
    color:black;
    font-weight:bold;
    cursor:pointer;
    width:100%;
}

.small-btn{
    width:auto;
    padding:5px 10px;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
    <h1>◆ LUNAR COASTAL DJ HUB</h1>
</header>

<nav>
    <button onclick="showTab('home')" class="active">Home</button>
    <button onclick="showTab('upload')">Upload</button>
    <button onclick="showTab('admin')">Admin</button>
</nav>

<!-- HOME -->
<section id="home" class="active">
    <h2>Live Songs</h2>
    <div id="songs"></div>
</section>

<!-- UPLOAD -->
<section id="upload">
    <h2>DJ Upload</h2>

    <div class="card">
        <input id="djcode" placeholder="DJ Code">
        <input id="title" placeholder="Song Title">
        <input id="code" placeholder="Music Code">
        <button onclick="submitSong()">Submit</button>
        <p id="status"></p>
    </div>
</section>

<!-- ADMIN -->
<section id="admin">
    <h2>Admin Panel</h2>
    <div id="pending"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
getFirestore, 
collection, 
addDoc, 
getDocs, 
updateDoc, 
doc, 
serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyBerxDREj6NUnoo5lFdIZRb2d8SV_ebw",
  authDomain: "lunar-coastal-dj.firebaseapp.com",
  projectId: "lunar-coastal-dj",
  storageBucket: "lunar-coastal-dj.firebasestorage.app",
  messagingSenderId: "5425058963",
  appId: "1:5425058963:web:d99b9cd5b370b15fd2a966"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   DJ CODES
========================= */
const djCodes = {
  "LOU-88421":"Lou",
  "NOX-19382":"Nox",
  "VIV-55210":"Viv",
  "FRO-77421":"Frosch",
  "GIO-99120":"Gio",
  "SOL-11293":"Soll",
  "MOO-88210":"Moozy",
  "SOF-55102":"Sofi",
  "ZEI-77190":"Zei",
  "CAM-44123":"Cams",
  "DAM-33210":"Damon",
  "LAN-88291":"Lans",
  "LEE-22190":"Lee",
  "MAX-99201":"Maxinah",
  "TOK-11923":"Tokyo",
  "TRE-55441":"Trell",
  "ZOD-77881":"Zodi"
};

let songs = [];

/* =========================
   TAB SYSTEM (FIXED)
========================= */
window.showTab = function(tab){

    document.querySelectorAll("section").forEach(s => {
        s.classList.remove("active");
    });

    document.getElementById(tab).classList.add("active");

    document.querySelectorAll("nav button").forEach(b => {
        b.classList.remove("active");
    });

    document.querySelector(`[onclick="showTab('${tab}')"]`)
    .classList.add("active");
};

/* =========================
   SUBMIT SONG (FIXED)
========================= */
window.submitSong = async function(){

    const code = document.getElementById("djcode").value.trim().toUpperCase();
    const title = document.getElementById("title").value;
    const music = document.getElementById("code").value;
    const status = document.getElementById("status");

    if(!code || !title || !music){
        status.innerText = "Fill all fields";
        return;
    }

    const dj = djCodes[code];

    if(!dj){
        status.innerText = "Invalid DJ Code";
        return;
    }

    await addDoc(collection(db,"pendingSongs"),{
        dj,
        title,
        code: music,
        status:"pending",
        createdAt:serverTimestamp()
    });

    status.innerText = "Submitted!";
};

/* =========================
   LOAD SONGS
========================= */
async function loadSongs(){
    const snap = await getDocs(collection(db,"songs"));

    songs = snap.docs.map(d => d.data());

    document.getElementById("songs").innerHTML =
    songs.map(s => `
        <div class="card">
            <h3>${s.title}</h3>
            <p>${s.dj}</p>
            <p>${s.code}</p>
        </div>
    `).join("");
}

/* =========================
   LOAD PENDING
========================= */
async function loadPending(){
    const snap = await getDocs(collection(db,"pendingSongs"));

    const pending = snap.docs.map(d => ({id:d.id, ...d.data()}));

    document.getElementById("pending").innerHTML =
    pending.map(p => `
        <div class="card">
            <h3>${p.title}</h3>
            <p>${p.dj}</p>

            <button class="small-btn" onclick="approve('${p.id}')">
                Approve
            </button>
        </div>
    `).join("");
}

/* =========================
   APPROVE (SAFE FIXED)
========================= */
window.approve = async function(id){

    const snap = await getDocs(collection(db,"pendingSongs"));
    const song = snap.docs.find(d => d.id === id);

    if(!song) return;

    const data = song.data();

    await addDoc(collection(db,"songs"),{
        title: data.title,
        dj: data.dj,
        code: data.code,
        createdAt: serverTimestamp()
    });

    await updateDoc(doc(db,"pendingSongs",id),{
        status:"approved"
    });

    loadSongs();
    loadPending();
};

/* =========================
   INIT
========================= */
loadSongs();
loadPending();

</script>
</body>
</html>
