<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Coastal DJ Library</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0b0b0b;
    color:white;
}

header{
    text-align:center;
    padding:40px 20px;
    border-bottom:1px solid rgba(255,215,0,.2);
}

.logo{
    font-size:42px;
    color:gold;
    font-weight:bold;
}

.subtitle{
    color:silver;
    margin-top:8px;
}

.search{
    text-align:center;
    padding:20px;
}

.search input{
    width:80%;
    max-width:600px;
    padding:15px;
    border-radius:10px;
    border:none;
    background:#1a1a1a;
    color:white;
}

.filters{
    text-align:center;
    margin:10px;
}

.filters select{
    padding:10px;
    background:#1a1a1a;
    color:white;
    border:none;
    border-radius:8px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:linear-gradient(145deg,#111,#1a1a1a);
    border:1px solid rgba(255,215,0,.2);
    padding:20px;
    border-radius:12px;
}

.card h3{
    color:gold;
}

.card p{
    color:silver;
    margin:5px 0;
}

button{
    margin-top:10px;
    background:gold;
    border:none;
    padding:10px;
    width:100%;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <div class="logo">◆ LUNAR COASTAL</div>
    <div class="subtitle">Live DJ Music Library</div>
</header>

<div class="search">
    <input id="searchInput" placeholder="Search songs or DJs...">
</div>

<div class="filters">
    <select id="djFilter">
        <option value="all">All DJs</option>
    </select>
</div>

<div class="grid" id="songs"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyBerxDREj6NUnoo5lFdIZRb2d8SV_ebw",
  authDomain: "lunar-coastal-dj.firebaseapp.com",
  projectId: "lunar-coastal-dj",
  storageBucket: "lunar-coastal-dj.firebasestorage.app",
  messagingSenderId: "5425058963",
  appId: "1:5425058963:web:d99b9cd5b370b15fd2a966"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allSongs = [];

const songsContainer = document.getElementById("songs");
const searchInput = document.getElementById("searchInput");
const djFilter = document.getElementById("djFilter");

// ✨ Render songs with animation + empty state
function renderSongs(list){
    songsContainer.innerHTML = "";

    if(list.length === 0){
        songsContainer.innerHTML = `
            <p style="text-align:center;color:gray;animation:fadeIn 0.5s;">
                No results found 😔
            </p>`;
        return;
    }

    list.forEach((song, index) => {
        const div = document.createElement("div");
        div.className = "card";

        // fade-in animation delay
        div.style.opacity = "0";
        div.style.transform = "translateY(10px)";
        div.style.animation = `fadeInUp 0.4s ease forwards ${index * 0.05}s`;

        div.innerHTML = `
            <h3>${song.title}</h3>
            <p>DJ: ${song.dj}</p>
            <p id="${song.code}">${song.code}</p>
            <button onclick="copyCode('${song.code}')">Copy Code</button>
        `;

        songsContainer.appendChild(div);
    });
}

// 📋 Copy function
window.copyCode = function(code){
    navigator.clipboard.writeText(code);
    alert("Copied: " + code);
}

// 🔥 Load Firestore songs
async function loadSongs(){
    const snapshot = await getDocs(collection(db,"songs"));

    allSongs = [];

    snapshot.forEach(doc => {
        allSongs.push(doc.data());
    });

    populateDJFilter();
    renderSongs(allSongs);
}

// 🎛️ Auto DJ filter
function populateDJFilter(){
    const djs = [...new Set(allSongs.map(s => s.dj))];

    djFilter.innerHTML = `<option value="all">All DJs</option>`;

    djs.forEach(dj => {
        const option = document.createElement("option");
        option.value = dj;
        option.textContent = dj;
        djFilter.appendChild(option);
    });
}

// 🔍 Search + Filter logic
function filterSongs(){
    let filtered = allSongs;

    const search = searchInput.value.toLowerCase();
    const selectedDJ = djFilter.value;

    if(selectedDJ !== "all"){
        filtered = filtered.filter(song => song.dj === selectedDJ);
    }

    if(search){
        filtered = filtered.filter(song =>
            song.title.toLowerCase().includes(search) ||
            song.dj.toLowerCase().includes(search)
        );
    }

    renderSongs(filtered);
}

// 🎯 Events
searchInput.addEventListener("input", filterSongs);
djFilter.addEventListener("change", filterSongs);

loadSongs();

</script>

</body>
</html>
