<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Coastal DJ HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    border-bottom:1px solid rgba(255,215,0,.2);
    position:relative;
}

header h1{
    color:gold;
    text-shadow:0 0 10px rgba(255,215,0,.3);
}

/* LOGIN BUTTON */
#loginBtn{
    position:absolute;
    right:20px;
    top:20px;
    background:gold;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 0 10px gold;
}

/* LOGIN MODAL */
#loginModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

#loginBox{
    background:#141414;
    padding:20px;
    border-radius:12px;
    width:300px;
    border:1px solid gold;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:6px;
    background:#222;
    color:white;
}

/* NAV */
nav{
    display:none;
    justify-content:center;
    gap:10px;
    padding:10px;
}

nav button{
    background:#1a1a1a;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

nav button.active{
    background:gold;
    color:black;
    box-shadow:0 0 10px gold;
}

/* SEARCH */
#searchBar{
    display:none;
    text-align:center;
    padding:10px;
}

#searchBar input{
    width:80%;
    max-width:600px;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#1a1a1a;
    color:white;
}

/* SECTIONS */
section{
    display:none;
    padding:20px;
}

section.active{
    display:block;
}

/* CARDS (SPOTIFY STYLE) */
.card{
    background:linear-gradient(145deg,#111,#1a1a1a);
    padding:15px;
    margin:10px auto;
    border-radius:12px;
    max-width:500px;
    border:1px solid rgba(255,215,0,.2);
    box-shadow:0 0 12px rgba(255,215,0,.05);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
    box-shadow:0 0 18px rgba(255,215,0,.2);
}

button{
    padding:10px;
    border:none;
    border-radius:6px;
    background:gold;
    color:black;
    font-weight:bold;
    cursor:pointer;
    width:100%;
}

.small-btn{
    width:auto;
    padding:5px 10px;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
    <h1>◆ LUNAR COASTAL DJ HUB</h1>
    <button id="loginBtn" onclick="openLogin()">Login</button>
</header>

<!-- LOGIN MODAL -->
<div id="loginModal">
    <div id="loginBox">
        <h3>Login Access</h3>
        <input id="accessCode" placeholder="Enter DJ / Admin Code">
        <button onclick="login()">Enter</button>
        <p id="loginStatus"></p>
    </div>
</div>

<!-- NAV -->
<nav id="nav">
    <button onclick="showTab('home')" class="active">Home</button>
    <button id="uploadTab" onclick="showTab('upload')" style="display:none;">Upload</button>
    <button id="adminTab" onclick="showTab('admin')" style="display:none;">Admin</button>
</nav>

<!-- SEARCH -->
<div id="searchBar">
    <input id="searchInput" placeholder="Search songs or DJs...">
</div>

<!-- HOME -->
<section id="home" class="active">
    <h2 style="text-align:center;">🎧 DJ Library</h2>
    <div id="songs"></div>
</section>

<!-- UPLOAD -->
<section id="upload">
    <h2>Upload Song</h2>
    <div class="card">
        <input id="title" placeholder="Song Title">
        <input id="code" placeholder="Music Code">
        <button onclick="submitSong()">Submit</button>
        <p id="status"></p>
    </div>
</section>

<!-- ADMIN -->
<section id="admin">
    <h2>Admin Panel</h2>
    <div id="pending"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
doc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyBerxDREj6NUnoo5lFdIZRb2d8SV_ebw",
  authDomain: "lunar-coastal-dj.firebaseapp.com",
  projectId: "lunar-coastal-dj",
  storageBucket: "lunar-coastal-dj.firebasestorage.app",
  messagingSenderId: "5425058963",
  appId: "1:5425058963:web:d99b9cd5b370b15fd2a966"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ROLES */
const djCodes = ["FRO-77421","GIO-99120","SOL-11293","MOO-88210","SOF-55102","ZEI-77190","CAM-44123","DAM-33210","LAN-88291","LEE-22190","MAX-99201","TOK-11923","TRE-55441","ZOD-77881"];
const adminCodes = ["LOU-88421","NOX-19382","VIV-55210];

let role = sessionStorage.getItem("role") || "guest";
let songs = [];

/* LOGIN */
window.openLogin = function(){
    document.getElementById("loginModal").style.display = "flex";
};

window.login = function(){
    const code = document.getElementById("accessCode").value.trim().toUpperCase();
    const status = document.getElementById("loginStatus");

    if(adminCodes.includes(code)){
        role = "admin";
        sessionStorage.setItem("role", role);
        unlockUI();
        status.innerText = "Admin logged in";
        return;
    }

    if(djCodes.includes(code)){
        role = "dj";
        sessionStorage.setItem("role", role);
        unlockUI();
        status.innerText = "DJ logged in";
        return;
    }

    status.innerText = "Invalid code";
};

/* UI UNLOCK */
function unlockUI(){
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("nav").style.display = "flex";
    document.getElementById("searchBar").style.display = "block";

    if(role !== "guest"){
        document.getElementById("uploadTab").style.display = "inline-block";
    }

    if(role === "admin"){
        document.getElementById("adminTab").style.display = "inline-block";
    }
}

/* TAB */
window.showTab = function(tab){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(tab).classList.add("active");
};

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", filterSongs);

function filterSongs(){
    const q = document.getElementById("searchInput").value.toLowerCase();

    const filtered = songs.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.dj.toLowerCase().includes(q)
    );

    renderSongs(filtered);
}

/* COPY */
window.copy = function(code){
    navigator.clipboard.writeText(code);
};

/* SUBMIT */
window.submitSong = async function(){

    if(role === "guest") return;

    const title = document.getElementById("title").value;
    const code = document.getElementById("code").value;

    await addDoc(collection(db,"pendingSongs"),{
        dj: role,
        title,
        code,
        status:"pending",
        createdAt:serverTimestamp()
    });

    document.getElementById("status").innerText = "Submitted!";
};

/* LOAD SONGS */
async function loadSongs(){
    const snap = await getDocs(collection(db,"songs"));
    songs = snap.docs.map(d => d.data());
    renderSongs(songs);
}

/* RENDER */
function renderSongs(list){
    document.getElementById("songs").innerHTML =
    list.map(s => `
        <div class="card">
            <h3>${s.title}</h3>
            <p>DJ: ${s.dj}</p>
            <p>${s.code}</p>
            <button class="small-btn" onclick="copy('${s.code}')">Copy</button>
        </div>
    `).join("");
}

/* LOAD PENDING */
async function loadPending(){
    const snap = await getDocs(collection(db,"pendingSongs"));

    document.getElementById("pending").innerHTML =
    snap.docs.map(d => {
        const p = d.data();
        return `
        <div class="card">
            <h3>${p.title}</h3>
            <p>${p.dj}</p>
            <button onclick="approve('${d.id}','${p.title}','${p.dj}','${p.code}')">Approve</button>
        </div>`;
    }).join("");
}

/* APPROVE */
window.approve = async function(id,title,dj,code){

    await addDoc(collection(db,"songs"),{
        title,
        dj,
        code,
        createdAt:serverTimestamp()
    });

    await updateDoc(doc(db,"pendingSongs",id),{
        status:"approved"
    });

    loadSongs();
    loadPending();
};

/* INIT */
loadSongs();
loadPending();

</script>

</body>
</html>
