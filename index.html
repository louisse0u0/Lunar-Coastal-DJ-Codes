<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Coastal DJ HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

/* HEADER */
header{
    padding:18px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.08);
    position:relative;
}

header h1{
    color:#ffffff;
    font-weight:700;
}

/* ACCESS BUTTON */
#accessBtn{
    position:absolute;
    right:15px;
    top:15px;
    background:#1f1f1f;
    border:1px solid #333;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
}

/* MODAL */
#accessModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

#accessBox{
    background:#141414;
    padding:20px;
    border-radius:12px;
    width:280px;
    border:1px solid #333;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
}

nav button{
    background:#1a1a1a;
    border:none;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

nav button.active{
    background:linear-gradient(90deg,#ff00cc,#3333ff);
}

/* SEARCH */
#searchBar{
    text-align:center;
    padding:10px;
}

#searchBar input{
    width:80%;
    max-width:600px;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#1a1a1a;
    color:white;
}

/* SECTIONS */
section{
    display:none;
    padding:20px;
}

section.active{
    display:block;
}

/* SPOTIFY STYLE CARDS */
.container{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:10px;
}

.card{
    min-width:220px;
    background:#151515;
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
    flex-shrink:0;
}

.card h3{
    margin:0;
    font-size:16px;
}

.card p{
    font-size:12px;
    color:#aaa;
}

button{
    margin-top:8px;
    width:100%;
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* glow buttons */
.glow{
    background:linear-gradient(90deg,#ff00cc,#3333ff);
    color:white;
}

.glow:active{
    transform:scale(0.96);
}

/* upload */
input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
    background:#1a1a1a;
    color:white;
}
</style>
</head>

<body>

<header>
    <h1>◆ LUNAR COASTAL DJ HUB</h1>
    <button id="accessBtn" onclick="openAccess()">Access</button>
</header>

<!-- ACCESS MODAL -->
<div id="accessModal">
    <div id="accessBox">
        <h3>Enter Code</h3>
        <input id="accessInput" placeholder="DJ / Admin Code">
        <button onclick="loginAccess()" class="glow">Enter</button>
        <p id="accessStatus"></p>
    </div>
</div>

<!-- NAV -->
<nav>
    <button onclick="showTab('home')" class="active">Home</button>
    <button id="uploadTab" onclick="showTab('upload')" style="display:none;">Upload</button>
    <button id="adminTab" onclick="showTab('admin')" style="display:none;">Admin</button>
</nav>

<!-- SEARCH -->
<div id="searchBar">
    <input id="searchInput" placeholder="Search songs or DJs...">
</div>

<!-- HOME -->
<section id="home" class="active">
    <div class="container" id="songs"></div>
</section>

<!-- UPLOAD -->
<section id="upload">
    <h2>Upload Song</h2>
    <input id="title" placeholder="Song Title">
    <input id="code" placeholder="Music Code">
    <button onclick="submitSong()" class="glow">Submit</button>
    <p id="status"></p>
</section>

<!-- ADMIN -->
<section id="admin">
    <h2>Admin Panel</h2>
    <div id="pending"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
doc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyBerxDREj6NUnoo5lFdIZRb2d8SV_ebw",
  authDomain: "lunar-coastal-dj.firebaseapp.com",
  projectId: "lunar-coastal-dj",
  storageBucket: "lunar-coastal-dj.firebasestorage.app",
  messagingSenderId: "5425058963",
  appId: "1:5425058963:web:d99b9cd5b370b15fd2a966"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ROLES */
const djCodes = ["FRO-77421","GIO-99120","SOL-11293","MOO-88210","SOF-55102","ZEI-77190","CAM-44123","DAM-33210","LAN-88291","LEE-22190","MAX-99201","TOK-11923","TRE-55441","ZOD-77881","LOU-88421","NOX-19382","VIV-55210"];
const adminCodes = ["LOU003","NOX002","VIV001"];

let role = sessionStorage.getItem("role") || "guest";
let songs = [];

/* ACCESS */
window.openAccess = () => {
    document.getElementById("accessModal").style.display = "flex";
};

window.loginAccess = () => {
    const code = document.getElementById("accessInput").value.toUpperCase();

    if(adminCodes.includes(code)){
        role = "admin";
        sessionStorage.setItem("role", role);
        unlockUI();
        return;
    }

    if(djCodes.includes(code)){
        role = "dj";
        sessionStorage.setItem("role", role);
        unlockUI();
        return;
    }

    document.getElementById("accessStatus").innerText = "Invalid code";
};

function unlockUI(){
    document.getElementById("accessModal").style.display = "none";

    document.getElementById("uploadTab").style.display = role !== "guest" ? "inline-block" : "none";
    document.getElementById("adminTab").style.display = role === "admin" ? "inline-block" : "none";
}

/* TAB */
window.showTab = (tab)=>{
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab).classList.add("active");
};

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",()=>{
    const q = document.getElementById("searchInput").value.toLowerCase();
    renderSongs(songs.filter(s =>
        s.title.toLowerCase().includes(q) ||
        s.dj.toLowerCase().includes(q)
    ));
});

/* COPY */
window.copyCode = (code)=>{
    navigator.clipboard.writeText(code);
};

/* SUBMIT */
window.submitSong = async ()=>{
    if(role==="guest") return;

    const title = document.getElementById("title").value;
    const code = document.getElementById("code").value;

    if(!title || !code) return;

    await addDoc(collection(db,"pendingSongs"),{
        dj: role,
        title,
        code,
        status:"pending",
        createdAt:serverTimestamp()
    });

    document.getElementById("status").innerText = "Submitted!";
};

/* LOAD SONGS */
async function loadSongs(){
    const snap = await getDocs(collection(db,"songs"));
    songs = snap.docs.map(d=>d.data());
    renderSongs(songs);
}

function renderSongs(list){
    document.getElementById("songs").innerHTML =
    list.map(s=>`
        <div class="card">
            <h3>${s.title}</h3>
            <p>${s.dj}</p>
            <p>${s.code}</p>
            <button class="glow" onclick="copyCode('${s.code}')">Copy</button>
        </div>
    `).join("");
}

/* LOAD ADMIN */
async function loadPending(){
    const snap = await getDocs(collection(db,"pendingSongs"));

    document.getElementById("pending").innerHTML =
    snap.docs.map(d=>{
        const p=d.data();
        return `
        <div class="card">
            <h3>${p.title}</h3>
            <p>${p.dj}</p>
            <button class="glow" onclick="approve('${d.id}','${p.title}','${p.dj}','${p.code}')">Approve</button>
            <button onclick="reject('${d.id}')">Reject</button>
        </div>`;
    }).join("");
}

/* APPROVE */
window.approve = async(id,title,dj,code)=>{
    await addDoc(collection(db,"songs"),{title,dj,code,createdAt:serverTimestamp()});
    await updateDoc(doc(db,"pendingSongs",id),{status:"approved"});
    loadSongs();
    loadPending();
};

/* REJECT */
window.reject = async(id)=>{
    await updateDoc(doc(db,"pendingSongs",id),{status:"rejected"});
    loadPending();
};

loadSongs();
loadPending();

window.onload = ()=>{
    if(role!=="guest") unlockUI();
};

</script>
</body>
</html>
