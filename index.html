<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Coastal DJ HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

/* HEADER */
header{
    padding:18px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.08);
    position:relative;
}

header h1{
    color:#fff;
}

/* ACCESS BUTTON */
#accessBtn{
    position:absolute;
    right:12px;
    top:12px;
    background:#1f1f1f;
    border:1px solid #333;
    color:white;
    padding:5px 9px;
    border-radius:8px;
    font-size:12px;
    cursor:pointer;
}

/* MODAL */
#accessModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

#accessBox{
    background:#141414;
    padding:20px;
    border-radius:12px;
    width:280px;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
}

nav button{
    background:#1a1a1a;
    border:none;
    color:white;
    padding:8px 12px;
    border-radius:8px;
}

nav button.active{
    background:linear-gradient(90deg,#ff00cc,#3333ff);
}

/* SEARCH (ONLY HOME) */
#searchBar{
    display:none;
    text-align:center;
    padding:10px;
}

#searchBar input{
    width:70%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1a1a1a;
    color:white;
}

/* HOME GRID (5 PER ROW FEEL) */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
    gap:10px;
    padding:15px;
}

/* CARD SMALLER */
.card{
    background:#151515;
    padding:10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.08);
}

/* BUTTONS */
button{
    margin-top:6px;
    width:100%;
    padding:7px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.glow{
    background:linear-gradient(90deg,#ff00cc,#3333ff);
    color:white;
}

.glow:active{
    transform:scale(0.97);
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
    background:#1a1a1a;
    color:white;
}
</style>
</head>

<body>

<header>
    <h1>◆ LUNAR COASTAL DJ HUB</h1>
    <button id="accessBtn" onclick="openAccess()">Access</button>
</header>

<!-- ACCESS -->
<div id="accessModal">
    <div id="accessBox">
        <input id="accessInput" placeholder="Enter Code">
        <button onclick="loginAccess()" class="glow">Enter</button>
        <p id="accessStatus"></p>
    </div>
</div>

<!-- NAV -->
<nav>
    <button onclick="showTab('home')" class="active">Home</button>
    <button id="uploadTab" onclick="showTab('upload')" style="display:none;">Upload</button>
    <button id="adminTab" onclick="showTab('admin')" style="display:none;">Admin</button>
</nav>

<!-- SEARCH ONLY HOME -->
<div id="searchBar">
    <input id="searchInput" placeholder="Search songs...">
</div>

<!-- HOME -->
<section id="home" class="active">
    <div class="grid" id="songs"></div>
</section>

<!-- UPLOAD -->
<section id="upload">
    <h2>Upload</h2>
    <input id="title" placeholder="Song Title">
    <input id="code" placeholder="Music Code">
    <button onclick="submitSong()" class="glow">Submit</button>
    <p id="status"></p>
</section>

<!-- ADMIN -->
<section id="admin">
    <h2>Admin Panel</h2>
    <div id="pending"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyBerxDREj6NUnoo5lFdIZRb2d8SV_ebw",
  authDomain: "lunar-coastal-dj.firebaseapp.com",
  projectId: "lunar-coastal-dj",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ACCESS */
let role = "guest";
const djCodes = ["FRO-77421","GIO-99120","SOL-11293","MOO-88210","SOF-55102","ZEI-77190","CAM-44123","DAM-33210","LAN-88291","LEE-22190","MAX-99201","TOK-11923","TRE-55441","ZOD-77881","LOU-88421","NOX-19382","VIV-55210"];
const adminCodes = ["LOU003","NOX002","VIV003"];

window.openAccess = () => {
    document.getElementById("accessModal").style.display = "flex";
};

window.loginAccess = () => {
    const code = document.getElementById("accessInput").value.toUpperCase();

    if(adminCodes.includes(code)){
        role = "admin";
        unlock();
        return;
    }

    if(djCodes.includes(code)){
        role = "dj";
        unlock();
        return;
    }

    document.getElementById("accessStatus").innerText = "Invalid";
};

function unlock(){
    document.getElementById("accessModal").style.display = "none";
    document.getElementById("uploadTab").style.display = "block";
    if(role==="admin") document.getElementById("adminTab").style.display="block";
    document.getElementById("searchBar").style.display = "block";
}

/* TAB */
window.showTab = (t)=>{
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(t).classList.add("active");
};

/* DATA */
let songs = [];

function exists(code){
    return songs.some(s => s.code === code);
}

/* SUBMIT */
window.submitSong = async ()=>{
    const title = document.getElementById("title").value;
    const code = document.getElementById("code").value;

    if(!title || !code){
        document.getElementById("status").innerText = "Fill all fields";
        return;
    }

    if(exists(code)){
        document.getElementById("status").innerText = "Code already exists";
        return;
    }

    await addDoc(collection(db,"pendingSongs"),{
        title,
        code,
        dj: role,
        createdAt:serverTimestamp()
    });

    document.getElementById("status").innerText = "Submitted";

    document.getElementById("title").value="";
    document.getElementById("code").value="";
};

/* LOAD HOME */
async function loadSongs(){
    const snap = await getDocs(collection(db,"songs"));
    songs = snap.docs.map(d=>d.data());
    render(songs);
}

function render(list){
    document.getElementById("songs").innerHTML =
    list.map(s=>`
        <div class="card">
            <h4>${s.title}</h4>
            <p>${s.dj}</p>
            <p>${s.code}</p>
        </div>
    `).join("");
}

/* ADMIN */
async function loadPending(){
    const snap = await getDocs(collection(db,"pendingSongs"));

    document.getElementById("pending").innerHTML =
    snap.docs.map(d=>{
        const p=d.data();
        return `
        <div class="card">
            <h4>${p.title}</h4>
            <p>${p.dj}</p>
            <button class="glow" onclick="approve('${d.id}')">Approve</button>
            <button onclick="remove('${d.id}')">Delete</button>
        </div>`;
    }).join("");
}

/* APPROVE */
window.approve = async(id)=>{
    const snap = await getDocs(collection(db,"pendingSongs"));
    const item = snap.docs.find(d=>d.id===id).data();

    await addDoc(collection(db,"songs"),item);
    await deleteDoc(doc(db,"pendingSongs",id));

    loadSongs();
    loadPending();
};

/* DELETE */
window.remove = async(id)=>{
    await deleteDoc(doc(db,"pendingSongs",id));
    loadPending();
};

loadSongs();
loadPending();

</script>

</body>
</html>
