<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Coastal DJ HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

/* HEADER */
header{
    padding:18px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.08);
    position:relative;
}

header h1{
    color:#ffffff;
    font-weight:700;
}

/* ACCESS BUTTON */
#accessBtn{
    position:absolute;
    right:12px;
    top:12px;
    background:#1f1f1f;
    border:1px solid #333;
    color:white;
    padding:4px 8px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    width:auto;
    height:auto;
    box-shadow:0 0 6px rgba(255,255,255,0.1);
}

/* MODAL */
#accessModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

#accessBox{
    background:#141414;
    padding:20px;
    border-radius:12px;
    width:280px;
    border:1px solid #333;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
}

nav button{
    background:#1a1a1a;
    border:none;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

nav button.active{
    background:linear-gradient(90deg,#ff00cc,#3333ff);
}

/* SEARCH */
#searchBar{
    text-align:center;
    padding:10px;
}

#searchBar input{
    width:80%;
    max-width:600px;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#1a1a1a;
    color:white;
}

/* SECTIONS */
section{
    display:none;
    padding:20px;
}

section.active{
    display:block;
}

/* GRID (5 columns) */
.container{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:10px;
    padding:10px;
}

@media(max-width:1200px){
    .container{ grid-template-columns:repeat(3,1fr); }
}

@media(max-width:700px){
    .container{ grid-template-columns:repeat(2,1fr); }
}

/* CARD */
.card{
    background:#151515;
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
}

.card h3{
    margin:0;
    font-size:14px;
}

.card p{
    font-size:12px;
    color:#aaa;
}

/* BUTTONS */
button{
    margin-top:6px;
    width:100%;
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* glow */
.glow{
    background:linear-gradient(90deg,#ff00cc,#3333ff);
    color:white;
}

.glow:active{
    transform:scale(0.96);
}

/* inputs */
input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
    background:#1a1a1a;
    color:white;
}
</style>
</head>

<body>

<header>
    <h1>◆ LUNAR COASTAL DJ HUB</h1>
    <button id="accessBtn" onclick="openAccess()">Access</button>
</header>

<!-- ACCESS -->
<div id="accessModal">
    <div id="accessBox">
        <h3>Enter Code</h3>
        <input id="accessInput" placeholder="DJ / Admin Code">
        <button onclick="loginAccess()" class="glow">Enter</button>
        <p id="accessStatus"></p>
    </div>
</div>

<!-- NAV -->
<nav>
    <button onclick="showTab('home')" class="active">Home</button>
    <button id="uploadTab" onclick="showTab('upload')" style="display:none;">Upload</button>
    <button id="adminTab" onclick="showTab('admin')" style="display:none;">Admin</button>
</nav>

<!-- SEARCH -->
<div id="searchBar">
    <input id="searchInput" placeholder="Search songs or DJs...">
</div>

<!-- HOME -->
<section id="home" class="active">
    <div class="container" id="songs"></div>
</section>

<!-- UPLOAD -->
<section id="upload">
    <h2>Upload Song</h2>
    <input id="title" placeholder="Song Title">
    <input id="code" placeholder="Music Code">
    <button onclick="submitSong()" class="glow">Submit</button>
    <p id="status"></p>
</section>

<!-- ADMIN -->
<section id="admin">
    <h2>Admin Panel</h2>
    <div class="container" id="adminSongs"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyBerxDREj6NUnoo5lFdIZRb2d8SV_ebw",
  authDomain: "lunar-coastal-dj.firebaseapp.com",
  projectId: "lunar-coastal-dj",
  storageBucket: "lunar-coastal-dj.firebasestorage.app",
  messagingSenderId: "5425058963",
  appId: "1:5425058963:web:d99b9cd5b370b15fd2a966"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ROLES */
const djMap = {
  "LOU-88421": "Lou",
  "NOX-19382": "Nox",
  "VIV-55210": "Viv",
  "FRO-77421": "Frosch",
  "GIO-99120": "Gio",
  "SOL-11293": "Soll",
  "MOO-88210": "Moozy",
  "SOF-55102": "Sofi",
  "ZEI-77190": "Zei",
  "CAM-44123": "Cams",
  "DAM-33210": "Damon",
  "LAN-88291": "Lans",
  "LEE-22190": "Lee",
  "MAX-99201": "Maxinah",
  "TOK-11923": "Tokyo",
  "TRE-55441": "Trell",
  "ZOD-77881": "Zodi"
};

const djCodes = Object.keys(djMap);

const adminCodes = [
  "LOU003",
  "NOX002",
  "VIV001"
];

let role = sessionStorage.getItem("role") || "guest";
let currentDJ = sessionStorage.getItem("djName") || "";
let songs = [];

/* ACCESS */
window.loginAccess = () => {

    const code = document
        .getElementById("accessInput")
        .value
        .trim()
        .toUpperCase();

    if(adminCodes.includes(code)){

        role = "admin";

        sessionStorage.setItem("role", role);
        sessionStorage.setItem("djName", "Administrator");

        unlockUI();
        return;
    }

    if(djMap[code]){

        role = "dj";

        sessionStorage.setItem("role", role);
        sessionStorage.setItem("djName", djMap[code]);

        currentDJ = djMap[code];

        unlockUI();
        return;
    }

    document.getElementById("accessStatus").innerText =
        "Invalid code";
};

function unlockUI(){
    document.getElementById("accessModal").style.display = "none";
    document.getElementById("uploadTab").style.display = "inline-block";
    document.getElementById("adminTab").style.display = role === "admin" ? "inline-block" : "none";
}

/* TAB */
window.showTab = (tab)=>{
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab).classList.add("active");

    document.getElementById("searchBar").style.display =
        (tab === "home" || tab === "admin") ? "block" : "none";
};

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", () => {

    const q = document.getElementById("searchInput").value
        .trim()
        .toLowerCase();

    if(q === ""){
        renderSongs(songs);
        renderAdmin(songs);
        return;
    }

    const filtered = songs.filter(s =>
        (s.title || "").toLowerCase().includes(q) ||
        (s.dj || "").toLowerCase().includes(q) ||
        (s.code || "").toLowerCase().includes(q)
    );

    renderSongs(filtered);
    renderAdmin(filtered);
});

/* COPY */
window.copyCode = (code)=>{
    navigator.clipboard.writeText(code);
};

/* SUBMIT */
window.submitSong = async ()=>{

    const title = document.getElementById("title").value.trim();
    const code = document.getElementById("code").value.trim();
    const status = document.getElementById("status");

    if(!title || !code){
        status.innerText = "Cannot submit blank fields";
        return;
    }

    const snap = await getDocs(collection(db,"songs"));
    const exists = snap.docs.some(d => d.data().code === code);

    if(exists){
        status.innerText = "Music code already exists";
        return;
    }

    await addDoc(collection(db,"songs"),{
        dj: currentDJ,
        title,
        code,
        createdAt:serverTimestamp()
    });

    status.innerText = "Submitted!";
    document.getElementById("title").value = "";
    document.getElementById("code").value = "";

    loadSongs();
};

/* LOAD SONGS */
async function loadSongs(){

    const snap = await getDocs(collection(db,"songs"));

songs = snap.docs.map(d => ({
    id: d.id,
    ...d.data()
}));

songs.sort((a, b) =>
    (a.title || "").localeCompare(b.title || "")
);

    renderSongs(songs);
    renderAdmin(songs);
}

/* RENDER (FIXED) */
function renderSongs(list = songs){

    document.getElementById("songs").innerHTML =
    list.map(s => `
        <div class="card">
            <h3>${s.title}</h3>
            <p>DJ: ${s.dj}</p>
            <p>ID: ${s.code}</p>

            <button class="glow"
            onclick="copyCode('${s.code}')">
                Copy
            </button>
        </div>
    `).join("");
}

/* DELETE */
window.deleteSong = async (id)=>{
    await deleteDoc(doc(db,"songs",id));
    loadSongs();
};

/* INIT */
loadSongs();
window.onload = ()=>{ if(role!=="guest") unlockUI(); };

</script>

</body>
</html>
