<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Coastal DJ HUB</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

/* HEADER */
header{
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,215,0,.2);
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    height:35px;
}

.logo h1{
    font-size:18px;
    color:gold;
}

/* LOGIN BUTTON SMALL */
#loginBtn{
    background:gold;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    box-shadow:0 0 8px rgba(255,215,0,.3);
}

/* LOGIN MODAL */
#loginModal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#loginBox{
    background:#141414;
    padding:20px;
    border-radius:12px;
    width:300px;
    border:1px solid gold;
}

/* NAV */
nav{
    display:none;
    justify-content:center;
    gap:10px;
    padding:10px;
}

nav button{
    background:#1a1a1a;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

nav button.active{
    background:gold;
    color:black;
    box-shadow:0 0 10px gold;
}

/* SEARCH ONLY HOME */
#searchBar{
    display:none;
    text-align:center;
    padding:10px;
}

#searchBar input{
    width:80%;
    max-width:500px;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#1a1a1a;
    color:white;
}

/* SECTIONS */
section{
    display:none;
    padding:20px;
}

section.active{
    display:block;
}

/* GRID 3 PER ROW */
#songs{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

/* MOBILE FIX */
@media(max-width:900px){
    #songs{
        grid-template-columns:repeat(1,1fr);
    }
}

/* CARD */
.card{
    background:#141414;
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(255,215,0,.2);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
    box-shadow:0 0 15px rgba(255,215,0,.2);
}

/* COPY BUTTON */
.copyBtn{
    width:100%;
    margin-top:8px;
    padding:8px;
    border:none;
    border-radius:6px;
    background:gold;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.copyBtn:active{
    transform:scale(0.95);
    box-shadow:0 0 15px gold;
}

/* SUBMIT BUTTON */
.submitBtn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    background:gold;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

.submitBtn:disabled{
    opacity:0.5;
    cursor:not-allowed;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <!-- REPLACE THIS WITH YOUR LOGO FILE -->
        <img src="logo.png">
        <h1>LUNAR COASTAL</h1>
    </div>

    <button id="loginBtn" onclick="openLogin()">Login</button>
</header>

<!-- LOGIN -->
<div id="loginModal">
    <div id="loginBox">
        <h3>Login</h3>
        <input id="accessCode" placeholder="DJ / Admin Code">
        <button onclick="login()">Enter</button>
        <p id="loginStatus"></p>
    </div>
</div>

<!-- NAV -->
<nav id="nav">
    <button onclick="showTab('home')" class="active">Home</button>
    <button id="uploadTab" onclick="showTab('upload')" style="display:none;">Upload</button>
    <button id="adminTab" onclick="showTab('admin')" style="display:none;">Admin</button>
</nav>

<!-- SEARCH (HOME ONLY) -->
<div id="searchBar">
    <input id="searchInput" placeholder="Search songs or DJs...">
</div>

<!-- HOME -->
<section id="home" class="active">
    <div id="songs"></div>
</section>

<!-- UPLOAD -->
<section id="upload">
    <h2>Upload</h2>
    <div class="card">
        <input id="title" placeholder="Song Title">
        <input id="code" placeholder="Music Code">
        <button id="submitBtn" class="submitBtn" onclick="submitSong()">Submit</button>
        <p id="status"></p>
    </div>
</section>

<!-- ADMIN -->
<section id="admin">
    <h2>Admin Panel</h2>
    <div id="pending"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
deleteDoc,
doc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyBerxDREj6NUnoo5lFdIZRb2d8SV_ebw",
  authDomain: "lunar-coastal-dj.firebaseapp.com",
  projectId: "lunar-coastal-dj",
  storageBucket: "lunar-coastal-dj.firebasestorage.app",
  messagingSenderId: "5425058963",
  appId: "1:5425058963:web:d99b9cd5b370b15fd2a966"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* CODES */
const djCodes = ["FRO-77421","GIO-99120","SOL-11293","MOO-88210","SOF-55102",
  "ZEI-77190","CAM-44123","DAM-33210","LAN-88291","LEE-22190",
  "MAX-99201","TOK-11923","TRE-55441","ZOD-77881","LOU-88421","NOX-19382","VIV-55210"];
const adminCodes = ["LOU003","NOX002","VIV001"];

let role = sessionStorage.getItem("role") || "guest";
let songs = [];

/* LOGIN */
window.openLogin = () =>
document.getElementById("loginModal").style.display = "flex";

window.login = () => {
    const code = document.getElementById("accessCode").value.trim().toUpperCase();

    if(adminCodes.includes(code)) role="admin";
    else if(djCodes.includes(code)) role="dj";
    else return document.getElementById("loginStatus").innerText="Invalid";

    sessionStorage.setItem("role",role);
    unlockUI();
};

/* UI */
function unlockUI(){
    document.getElementById("loginModal").style.display="none";
    document.getElementById("nav").style.display="flex";
    document.getElementById("searchBar").style.display="block";

    if(role!="guest")
        document.getElementById("uploadTab").style.display="inline-block";

    if(role=="admin")
        document.getElementById("adminTab").style.display="inline-block";
}

/* TAB */
window.showTab = tab => {
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab).classList.add("active");

    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
};

/* COPY */
window.copy = code => {
    navigator.clipboard.writeText(code);
};

/* SUBMIT */
window.submitSong = async () => {
    if(role==="guest") return;

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;

    await addDoc(collection(db,"pendingSongs"),{
        title:document.getElementById("title").value,
        code:document.getElementById("code").value,
        dj:role,
        status:"pending",
        createdAt:serverTimestamp()
    });

    btn.disabled = false;
};

/* LOAD */
async function loadSongs(){
    const snap = await getDocs(collection(db,"songs"));
    songs = snap.docs.map(d=>d.data());
    renderSongs(songs);
}

function renderSongs(list){
    document.getElementById("songs").innerHTML =
    list.map(s=>`
        <div class="card">
            <h3>${s.title}</h3>
            <p>${s.dj}</p>
            <p>${s.code}</p>
            <button class="copyBtn" onclick="copy('${s.code}')">COPY</button>
        </div>
    `).join("");
}

/* ADMIN */
async function loadPending(){
    const snap = await getDocs(collection(db,"pendingSongs"));

    document.getElementById("pending").innerHTML =
    snap.docs.map(d=>{
        const p=d.data();
        return `
        <div class="card">
            <h3>${p.title}</h3>
            <p>${p.dj}</p>

            <button onclick="approve('${d.id}','${p.title}','${p.dj}','${p.code}')">Approve</button>
            <button onclick="reject('${d.id}')">Reject</button>
        </div>`;
    }).join("");
}

/* APPROVE */
window.approve = async (id,title,dj,code)=>{
    await addDoc(collection(db,"songs"),{title,dj,code});
    await updateDoc(doc(db,"pendingSongs",id),{status:"approved"});
    loadSongs(); loadPending();
};

/* REJECT */
window.reject = async id=>{
    await deleteDoc(doc(db,"pendingSongs",id));
    loadPending();
};

/* INIT */
loadSongs();
loadPending();

</script>
</body>
</html>
