<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Upload Portal</title>

<style>
body{
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:auto;
    padding:40px 20px;
}

h1{
    color:gold;
    text-align:center;
}

.card{
    background:#141414;
    padding:25px;
    border-radius:15px;
    border:1px solid rgba(255,215,0,.2);
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}

button{
    background:gold;
    color:black;
    border:none;
    padding:12px;
    width:100%;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>◇ Lunar Coastal DJ Portal</h1>

<div class="card">

<label>Roblox Username</label>
<input id="username">

<label>Song Title</label>
<input id="title">

<label>Music Code</label>
<input id="code">

<button id="submitBtn">
Submit For Approval
</button>

<p id="status"></p>

</div>

</body>
</html>
